services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: dev
    volumes:
      - ./apps/api:/app
    environment:
      DEBUG: "true"
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    volumes:
      - ./apps/worker:/app
    command: celery -A src.celery_app worker -l debug -Q default,grading,generation,export,calibration

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: dev
    volumes:
      - ./apps/web/src:/app/src
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
