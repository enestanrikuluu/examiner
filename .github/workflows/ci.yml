name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"
      - name: Lint
        run: |
          cd apps/api
          ruff check src tests
          ruff format --check src tests

  typecheck-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"
      - name: Type check
        run: |
          cd apps/api
          mypy src

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: examiner_test
          POSTGRES_USER: examiner
          POSTGRES_PASSWORD: examiner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"
      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://examiner:examiner@localhost:5432/examiner_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd apps/api
          pytest tests -v --cov=src

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd apps/web
          npm ci
      - name: Lint
        run: |
          cd apps/web
          npx eslint src

  typecheck-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd apps/web
          npm ci
      - name: Type check
        run: |
          cd apps/web
          npx tsc --noEmit

  build-web:
    runs-on: ubuntu-latest
    needs: [lint-web, typecheck-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd apps/web
          npm ci
      - name: Build
        run: |
          cd apps/web
          npm run build
